name: CI
on: [push]
jobs:
  test-sanity:
    runs-on: ubuntu-latest
    container:
      image: python:3.7
    env:
      REZILION_LICENSE_KEY: ${{ secrets.REZILION_LICENSE_KEY }}
 
    steps:
      - uses: actions/checkout@v3
      - uses: Rezilion/github-action@v2.5.1 
        with:
          mode: 'start'
          image_name: 'python:3.7'
          command: 'echo "Hello"; python3 --version'
      
  Rezilion:
    needs: [test-sanity]
    runs-on: ubuntu-latest
    container:
      image: python:3.7
    env:
      REZILION_LICENSE_KEY: ${{ secrets.REZILION_LICENSE_KEY }}
      REZILION_ACCESS_TOKEN: ${{ secrets.REZILION_ACCESS_TOKEN }}
#      REZILION_SEVERITY_GATE: "critical"
    steps:
      - uses: actions/checkout@v3
      - uses: Rezilion/github-action@v2.5.1 
        with:
          mode: 'validate'
              
      
  
